<!--
  Standalone preview of the language-select screen

  Shows all three breakpoints side-by-side in one HTML file. Each
  device frame isolates the responsive rules inside a container query,
  so every frame renders at its own width independent of the browser
  viewport — the real app uses plain @media (min-width: 728px) since
  it's not wrapped in a CSS container.
-->

<style>
  /* ─── Design tokens ──────────────────────────────────────────── */
  :root {
    --color-background-canvas: #f9f9ff;
    --color-background-primary: #ffffff;
    --color-background-secondary: #eaefff;
    --color-background-brand: #5856d6;
    --color-text-primary: #393c46;
    --color-text-secondary: #8695aa;
    --color-text-on-accent: #ffffff;
    --color-border-primary: #dde4f9;
    --color-border-brand: #5856d6;
    --color-ring-inverse: #ffffff;
    --color-ring-brand: rgba(88, 86, 214, 0.10);

    --space-4: 4px;
    --space-8: 8px;
    --space-12: 12px;
    --space-16: 16px;
    --space-20: 20px;
    --space-24: 24px;
    --space-32: 32px;

    --radius-medium: 20px;

    --font-family-base: "SF Pro Display", -apple-system, BlinkMacSystemFont,
      "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: #e9e9f0;
    font-family: var(--font-family-base);
    color: var(--color-text-primary);
    -webkit-font-smoothing: antialiased;
    padding: 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  h2 {
    font-size: 14px;
    font-weight: 600;
    color: #6b6f80;
    margin: 0;
  }

  .gallery {
    display: flex;
    gap: 32px;
    align-items: flex-start;
    flex-wrap: wrap;
    justify-content: center;
  }

  .device {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  /*
   * `container-type: inline-size` lets us use a container query below
   * so each frame's internal grid reacts to its OWN width rather than
   * the viewport. The real React app uses @media instead.
   */
  .frame {
    container-type: inline-size;
    background: var(--color-background-canvas);
    display: flex;
    flex-direction: column;
    border-radius: 28px;
    overflow: hidden;
    box-shadow:
      0 8px 22px rgba(20, 23, 40, 0.10),
      0 24px 64px rgba(20, 23, 40, 0.12);
  }
  .frame--375 { width: 375px; }
  .frame--425 { width: 425px; }
  .frame--728 { width: 728px; }

  /* Header — logo only, no progress bar. */
  .header {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: var(--space-24) var(--space-16) var(--space-16);
  }
  .header svg { display: block; height: 24px; width: 129px; }

  /* Content region. */
  .content {
    flex: 1 0 auto;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: var(--space-32);
  }

  .title {
    margin: 0;
    text-align: center;
    color: var(--color-text-primary);
    font-weight: 700;
    font-size: 24px;
    line-height: 32px;
    letter-spacing: 0.24px;
    padding: 0 var(--space-16);
  }

  /* Grid — 2 cols by default, 4 cols at ≥728. */
  .grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: var(--space-16);
    padding: 0 var(--space-16);
  }
  @container (min-width: 728px) {
    .grid {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }
  }

  /* Card */
  .card {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: var(--space-8);
    padding: var(--space-16) var(--space-12);
    border-radius: var(--radius-medium);
    background: var(--color-ring-inverse);
    border: 1px solid var(--color-border-primary);
    font-family: inherit;
    cursor: pointer;
    transition:
      background-color 150ms ease,
      border-color 150ms ease,
      transform 100ms ease;
    outline: none;
    min-height: 96px;
  }
  .card:hover:not(.cardSelected) {
    background: #f7f8ff;
  }
  .card:active { transform: scale(0.985); }
  .cardSelected {
    background: var(--color-ring-brand);
    border: 2px solid var(--color-border-brand);
    padding: calc(var(--space-16) - 1px) calc(var(--space-12) - 1px);
  }

  .flag {
    width: 32px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background: var(--color-background-primary);
    border: 1px solid var(--color-border-primary);
    flex-shrink: 0;
    border-radius: 2px;
  }
  .flag.flag--globe { border: none; background: transparent; }
  .flag img { width: 100%; height: 100%; object-fit: cover; display: block; }

  .label {
    font-weight: 600;
    font-size: 16px;
    line-height: 24px;
    color: var(--color-text-primary);
    text-align: center;
    white-space: nowrap;
  }

  /* Action container */
  .actionContainer {
    background: var(--color-background-primary);
    padding: var(--space-24) var(--space-16);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: var(--space-24);
  }
  .cta {
    width: 342px;
    height: 56px;
    max-width: 100%;
    padding: var(--space-16) var(--space-24);
    border: none;
    border-radius: var(--radius-medium);
    background: var(--color-background-brand);
    color: var(--color-text-on-accent);
    font-family: inherit;
    font-weight: 600;
    font-size: 16px;
    line-height: 24px;
    cursor: pointer;
  }
  .cta:hover { background: #4f4dc7; }
  .cta:active { transform: scale(0.985); }
</style>

    </svg>
  </header>

  <main class="content">
    <h1 class="title">What&rsquo;s your native language?</h1>

    <div class="grid" role="radiogroup" aria-label="Native language"></div>
  </main>

  <footer class="actionContainer">
    <button class="cta" type="button">Next</button>
  </footer>
</template>

<script>
  const LOCALES = [
    { code: "en", label: "English",    flag: "flags/English.svg" },
    { code: "es", label: "Spanish",    flag: "flags/Spanish.svg" },
    { code: "pt", label: "Portuguese", flag: "flags/Portuguese.svg" },
    { code: "de", label: "German",     flag: "flags/German.svg" },
    { code: "fr", label: "French",     flag: "flags/French.svg" },
    { code: "tr", label: "Turkish",    flag: "flags/Turkish.svg" },
    { code: "it", label: "Italian",    flag: "flags/Italian.svg" },
    { code: "bg", label: "Bulgarian",  flag: "flags/Bulgarian.svg" },
    { code: "zh", label: "Chinese",    flag: "flags/Chinese.svg" },
    { code: "cs", label: "Czech",      flag: "flags/Czech.svg" },
    { code: "fi", label: "Finnish",    flag: "flags/Finnish.svg" },
    { code: "el", label: "Greek",      flag: "flags/Greek.svg" },
    { code: "id", label: "Indonesian", flag: "flags/Indonesian.svg" },
    { code: "ja", label: "Japanese",   flag: "flags/Japanese.svg" },
    { code: "ko", label: "Korean",     flag: "flags/Korean.svg" },
    { code: "pl", label: "Polish",     flag: "flags/Polish.svg" },
    { code: "ru", label: "Russian",    flag: "flags/Russian.svg" },
    { code: "sv", label: "Swedish",    flag: "flags/Swedish.svg" },
    { code: "uk", label: "Ukrainian",  flag: "flags/Ukrainian.svg" },
    { code: "other", label: "Other",   flag: "flags/Other.svg" },
  ];

  /** Build a card button for one locale. */
  function buildCard(locale, selectedCode, onSelect) {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "card" + (locale.code === selectedCode ? " cardSelected" : "");
    btn.setAttribute("role", "radio");
    btn.setAttribute("aria-checked", String(locale.code === selectedCode));

    const flag = document.createElement("div");
    flag.className = "flag";
    const img = document.createElement("img");
    img.src = locale.flag;
    img.alt = "";
    flag.appendChild(img);

    const label = document.createElement("span");
    label.className = "label";
    label.textContent = locale.label;

    btn.appendChild(flag);
    btn.appendChild(label);
    btn.addEventListener("click", () => onSelect(locale.code));
    return btn;
  }

  /** Render one frame with its own state. */
  function mountFrame(frameEl) {
    const tpl = document.getElementById("frame-tpl");
    frameEl.appendChild(tpl.content.cloneNode(true));
    const grid = frameEl.querySelector(".grid");

    let selected = "en"; // English is pre-selected by default.

    function render() {
      grid.innerHTML = "";
      LOCALES.forEach((l) => {
        grid.appendChild(buildCard(l, selected, (code) => {
          selected = code;
          render();
        }));
      });
    }

    render();
  }

  document.querySelectorAll(".frame").forEach(mountFrame);
</script>

</body>
</html>
